server {
    listen 3000;
    root /usr/share/nginx/html;

    location = /health {
        default_type text/plain;
        return 200 "nginx-ok-837c17f";
    }

    location = /login {
        rewrite ^ /index.html last;
    }

    location = /portfolio {
        rewrite ^ /index.html last;
    }

    location / {
        try_files $uri /index.html;
    }
}
